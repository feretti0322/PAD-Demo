<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スタッフ一覧 | PAD練習サイト</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebarContainer"></div>
    <div class="main-content">
      <header class="topbar">
        <div class="topbar-title">👥 スタッフ一覧</div>
        <div class="topbar-user"><span>👤</span><span id="topbarUser">user</span></div>
      </header>

      <main class="page-content">
        <div class="page-header">
          <div>
            <h2>スタッフ一覧</h2>
            <div class="breadcrumb">全スタッフの情報を確認できます</div>
          </div>
        </div>

        <div class="card">
          <!-- フィルターバー -->
          <div class="filter-bar">
            <div class="filter-group">
              <label>氏名</label>
              <input type="text" id="searchName" class="form-control" placeholder="氏名で検索" style="min-width:180px;" oninput="filterTable()">
            </div>
            <div class="filter-group">
              <label>部署</label>
              <select id="filterDept" class="form-control" onchange="filterTable()">
                <option value="">すべての部署</option>
                <option value="営業部">営業部</option>
                <option value="開発部">開発部</option>
                <option value="管理部">管理部</option>
                <option value="総務部">総務部</option>
              </select>
            </div>
            <div class="filter-group">
              <label>役職</label>
              <select id="filterRole" class="form-control" onchange="filterTable()">
                <option value="">すべての役職</option>
                <option value="部長">部長</option>
                <option value="課長">課長</option>
                <option value="主任">主任</option>
                <option value="一般">一般</option>
              </select>
            </div>
            <div class="filter-group" style="justify-content:flex-end;">
              <label>&nbsp;</label>
              <button class="btn btn-outline" onclick="clearFilter()">クリア</button>
            </div>
          </div>

          <!-- 件数表示 -->
          <div style="padding: 10px 20px; font-size: 13px; color: #888; border-bottom: 1px solid #e0e6ed;">
            <span id="resultCount">0</span> 件表示
          </div>

          <!-- テーブル -->
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>氏名</th>
                  <th>部署</th>
                  <th>役職</th>
                  <th>入社日</th>
                  <th class="center">内線番号</th>
                </tr>
              </thead>
              <tbody id="staffTbody"></tbody>
            </table>
          </div>

          <!-- ページネーション -->
          <div class="pagination">
            <div class="page-info" id="pageInfo"></div>
            <button class="page-btn" id="btnPrev" onclick="changePage(-1)">&#8249;</button>
            <div id="pageNumbers" style="display:flex;gap:4px;"></div>
            <button class="page-btn" id="btnNext" onclick="changePage(1)">&#8250;</button>
          </div>
        </div>
      </main>
      <footer class="app-footer">© 2025 PAD練習サイト</footer>
    </div>
  </div>

  <script src="js/common.js?v=2"></script>
  <script>
    checkLogin();
    document.getElementById('sidebarContainer').innerHTML = renderSidebar('staff-list');
    document.getElementById('topbarUser').textContent = sessionStorage.getItem('userName') || 'user';

    const PER_PAGE = 10;
    let currentPage = 1;

    // URLパラメータで初期フィルター設定
    const params = new URLSearchParams(location.search);
    const initName = params.get('name') || '';
    const initDept = params.get('dept') || '';
    const initRole = params.get('role') || '';
    if (initName) document.getElementById('searchName').value = initName;
    if (initDept) document.getElementById('filterDept').value = initDept;
    if (initRole) document.getElementById('filterRole').value = initRole;

    function getFiltered() {
      const kw   = document.getElementById('searchName').value.toLowerCase();
      const dept = document.getElementById('filterDept').value;
      const role = document.getElementById('filterRole').value;
      return STAFF_DATA.filter(s => {
        const matchName = !kw   || s.name.toLowerCase().includes(kw);
        const matchDept = !dept || s.dept === dept;
        const matchRole = !role || s.role === role;
        return matchName && matchDept && matchRole;
      });
    }

    function renderTable() {
      const filtered   = getFiltered();
      const totalPages = Math.ceil(filtered.length / PER_PAGE) || 1;
      if (currentPage > totalPages) currentPage = totalPages;
      const start    = (currentPage - 1) * PER_PAGE;
      const pageData = filtered.slice(start, start + PER_PAGE);

      document.getElementById('resultCount').textContent = filtered.length;
      document.getElementById('pageInfo').textContent =
        `${start + 1}〜${Math.min(start + PER_PAGE, filtered.length)} 件 / 全 ${filtered.length} 件`;

      const deptBadge = { '営業部': 'badge-info', '開発部': 'badge-success', '管理部': 'badge-warning', '総務部': 'badge-secondary' };
      const roleBadge = { '部長': 'badge-danger', '課長': 'badge-info', '主任': 'badge-success', '一般': 'badge-secondary' };

      const tbody = document.getElementById('staffTbody');
      tbody.innerHTML = '';
      if (pageData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted" style="padding:32px;">該当するスタッフがいません</td></tr>';
      } else {
        pageData.forEach(s => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><span class="text-muted">${s.id}</span></td>
            <td><a href="staff-detail.html?id=${s.id}" style="color:#2c7be5;text-decoration:none;font-weight:700;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${s.name}</a></td>
            <td><span class="badge ${deptBadge[s.dept] || 'badge-secondary'}">${s.dept}</span></td>
            <td><span class="badge ${roleBadge[s.role] || 'badge-secondary'}">${s.role}</span></td>
            <td>${s.joined}</td>
            <td class="center">${s.ext}</td>
          `;
          tbody.appendChild(tr);
        });
      }

      // ページネーション
      const pn = document.getElementById('pageNumbers');
      pn.innerHTML = '';
      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.className = 'page-btn' + (i === currentPage ? ' active' : '');
        btn.textContent = i;
        btn.onclick = () => { currentPage = i; renderTable(); };
        pn.appendChild(btn);
      }
      document.getElementById('btnPrev').disabled = currentPage === 1;
      document.getElementById('btnNext').disabled = currentPage === totalPages;
    }

    function filterTable() {
      currentPage = 1;
      renderTable();
    }

    function clearFilter() {
      document.getElementById('searchName').value = '';
      document.getElementById('filterDept').value = '';
      document.getElementById('filterRole').value = '';
      // URLパラメータもリセット
      history.replaceState(null, '', 'staff-list.html');
      filterTable();
    }

    function changePage(dir) {
      const filtered   = getFiltered();
      const totalPages = Math.ceil(filtered.length / PER_PAGE) || 1;
      currentPage = Math.max(1, Math.min(totalPages, currentPage + dir));
      renderTable();
    }

    renderTable();
  </script>
</body>
</html>
