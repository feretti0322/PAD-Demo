<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スタッフ検索</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Yu Gothic UI', '游ゴシック', sans-serif;
      font-size: 14px;
      color: #333;
      background: rgba(0, 0, 0, 0.5);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 背景クリックで閉じるための透明レイヤー */
    .overlay-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      cursor: pointer;
    }

    .modal {
      position: relative;
      z-index: 1;
      background: #fff;
      border-radius: 12px;
      width: 480px;
      max-width: 90vw;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid #e0e6ed;
      background: #fff;
    }

    .modal-header .title {
      font-size: 15px;
      font-weight: 700;
      color: #1a3a5c;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 22px;
      line-height: 1;
      color: #888;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: background 0.15s, color 0.15s;
    }
    .close-btn:hover { background: #f4f6f9; color: #333; }

    .modal-body {
      padding: 20px 24px 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .form-control {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 14px;
      color: #333;
      background: #fff;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-control:focus {
      outline: none;
      border-color: #2c7be5;
      box-shadow: 0 0 0 3px rgba(44, 123, 229, 0.15);
    }
    select.form-control { cursor: pointer; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .btn-search {
      flex: 1;
      padding: 11px;
      background: #2c7be5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .btn-search:hover { background: #1a68d1; }
    .btn-clear {
      padding: 11px 18px;
      background: transparent;
      color: #555;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .btn-clear:hover { background: #f4f6f9; }
  </style>
</head>
<body>

  <!-- 背景クリックで閉じる -->
  <div class="overlay-bg" onclick="window.parent.closeStaffSearch()"></div>

  <div class="modal">
    <div class="modal-header">
      <span class="title">🔍 スタッフ検索</span>
      <button class="close-btn" onclick="window.parent.closeStaffSearch()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>氏名</label>
        <input type="text" id="sName" class="form-control" placeholder="例：山田">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>部署</label>
          <select id="sDept" class="form-control">
            <option value="">すべての部署</option>
            <option value="営業部">営業部</option>
            <option value="開発部">開発部</option>
            <option value="管理部">管理部</option>
            <option value="総務部">総務部</option>
          </select>
        </div>
        <div class="form-group">
          <label>役職</label>
          <select id="sRole" class="form-control">
            <option value="">すべての役職</option>
            <option value="部長">部長</option>
            <option value="課長">課長</option>
            <option value="主任">主任</option>
            <option value="一般">一般</option>
          </select>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn-search" onclick="doSearch()">🔍 検索する</button>
        <button class="btn-clear" onclick="clearForm()">クリア</button>
      </div>
    </div>
  </div>

  <script>
    function doSearch() {
      const name = document.getElementById('sName').value.trim();
      const dept = document.getElementById('sDept').value;
      const role = document.getElementById('sRole').value;
      const params = new URLSearchParams();
      if (name) params.set('name', name);
      if (dept) params.set('dept', dept);
      if (role) params.set('role', role);
      window.top.location.href = 'staff-list.html?' + params.toString();
    }

    function clearForm() {
      document.getElementById('sName').value = '';
      document.getElementById('sDept').value = '';
      document.getElementById('sRole').value = '';
      document.getElementById('sName').focus();
    }

    // Enterキーで検索
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
      if (e.key === 'Escape') window.parent.closeStaffSearch();
    });
  </script>
</body>
</html>
