<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン | PAD練習サイト</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-hint {
      background: rgba(44,123,229,0.08);
      border: 1px dashed #2c7be5;
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 20px;
      font-size: 12px;
      color: #555;
    }
    .login-hint strong { color: #2c7be5; }
    .terms-link { color: #2c7be5; }
    .error-msg {
      color: #e63757;
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }
    .signup-link {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
    }
    .signup-link a {
      color: #2c7be5;
      font-weight: 600;
      text-decoration: none;
    }
    .signup-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">&#128187;</div>
        <h1>PAD練習サイト</h1>
        <div class="subtitle">Power Automate for Desktop 操作練習用</div>
      </div>

      <div class="login-hint">
        <strong>&#128274; メール＋パスワードでログイン</strong><br>
        Supabase 認証を利用しています。アカウントをお持ちでない方は下のリンクから新規登録してください。
      </div>

      <form id="loginForm" onsubmit="return doLogin(event)">
        <div class="form-group">
          <label for="email">メールアドレス <span class="required">*</span></label>
          <input type="email" id="email" class="form-control" placeholder="例: yamada@example.com" autocomplete="username">
          <div class="error-msg" id="email-error">メールアドレスを入力してください</div>
        </div>

        <div class="form-group">
          <label for="password">パスワード <span class="required">*</span></label>
          <input type="password" id="password" class="form-control" placeholder="パスワード（8文字以上）" autocomplete="current-password">
          <div class="error-msg" id="password-error">パスワードを入力してください</div>
        </div>

        <div class="form-check">
          <input type="checkbox" id="agree" name="agree">
          <label for="agree">
            <a href="#" class="terms-link" onclick="return false;">利用規約</a>に同意する
          </label>
        </div>
        <div class="error-msg" id="agree-error" style="margin-top:-12px; margin-bottom:12px;">利用規約への同意が必要です</div>

        <div class="error-msg" id="auth-error" style="font-size:13px; text-align:center; margin-bottom:12px;">
          メールアドレスまたはパスワードが正しくありません
        </div>

        <button type="submit" class="btn btn-primary btn-lg" id="loginBtn">
          ログイン
        </button>
      </form>

      <div class="signup-link">
        アカウントをお持ちでない方は <a href="signup.html">新規登録はこちら</a>
      </div>

      <div style="margin-top: 20px; font-size: 11px; color: #aaa; text-align: center;">
        &copy; 2025 PAD練習サイト | このサイトはPower Automate for Desktop操作練習用のデモサイトです
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/env.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // すでにログイン済みなら即リダイレクト
    (async () => {
      const user = await window.auth.getCurrentUser();
      if (user) window.location.href = 'pad-overview.html';
    })();

    async function doLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const agree = document.getElementById('agree').checked;

      document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');

      let hasError = false;
      if (!email) { document.getElementById('email-error').style.display = 'block'; hasError = true; }
      if (!password) { document.getElementById('password-error').style.display = 'block'; hasError = true; }
      if (!agree) { document.getElementById('agree-error').style.display = 'block'; hasError = true; }
      if (hasError) return false;

      const btn = document.getElementById('loginBtn');
      btn.innerHTML = '<span class="loading"></span> ログイン中...';
      btn.disabled = true;

      const { data, error } = await window.auth.signIn(email, password);

      if (error) {
        const msg = document.getElementById('auth-error');
        msg.textContent = error.message === 'Invalid login credentials'
          ? 'メールアドレスまたはパスワードが正しくありません'
          : 'ログインに失敗しました：' + error.message;
        msg.style.display = 'block';
        btn.innerHTML = 'ログイン';
        btn.disabled = false;
        return false;
      }

      window.location.href = 'pad-overview.html';
      return false;
    }
  </script>
</body>
</html>
