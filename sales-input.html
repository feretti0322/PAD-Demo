<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>売上入力 | PAD練習サイト</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .input-card {
      max-width: 680px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .confirm-table {
      width: 100%;
      border-collapse: collapse;
    }
    .confirm-table td {
      padding: 10px 16px;
      border-bottom: 1px solid #e8ecf0;
      font-size: 13px;
    }
    .confirm-table td:first-child {
      color: #888;
      font-weight: 600;
      width: 120px;
      background: #f8fafc;
    }
    .confirm-table td:last-child {
      font-weight: 500;
      color: #1a3a5c;
    }
    .step-indicator {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 24px;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #aaa;
    }
    .step.active { color: #2c7be5; }
    .step.done { color: #00b274; }
    .step-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      background: #e0e6ed;
      color: #aaa;
    }
    .step.active .step-num { background: #2c7be5; color: #fff; }
    .step.done .step-num { background: #00b274; color: #fff; }
    .step-line {
      flex: 1;
      height: 2px;
      background: #e0e6ed;
      max-width: 60px;
    }
    .step-line.done { background: #00b274; }
  </style>
</head>
<body>
  <div class="app-layout">
    <div id="sidebarContainer"></div>

    <div class="main-content">
      <div class="topbar">
        <div>
          <div class="topbar-title">売上入力</div>
          <div class="breadcrumb">ホーム &rsaquo; 売上入力</div>
        </div>
        <div class="topbar-right">
          <div class="topbar-user">
            <div class="user-avatar" id="userAvatar">U</div>
            <span id="userName">user</span>
          </div>
        </div>
      </div>

      <div class="page-content">
        <!-- ステップインジケーター -->
        <div class="step-indicator" id="stepIndicator">
          <div class="step active" id="step1">
            <div class="step-num">1</div>
            <span>入力</span>
          </div>
          <div class="step-line" id="line12"></div>
          <div class="step" id="step2">
            <div class="step-num">2</div>
            <span>確認</span>
          </div>
          <div class="step-line" id="line23"></div>
          <div class="step" id="step3">
            <div class="step-num">3</div>
            <span>完了</span>
          </div>
        </div>

        <!-- STEP 1: 入力フォーム -->
        <div class="card input-card" id="formSection">
          <div class="card-header">
            <h3>&#9998; 売上情報の入力</h3>
          </div>
          <div class="card-body">
            <div id="formAlert"></div>
            <form id="salesForm">
              <div class="form-row">
                <div class="form-group">
                  <label for="salesDate">売上日 <span class="required">*</span></label>
                  <input type="date" id="salesDate" class="form-control">
                </div>
                <div class="form-group">
                  <label for="salesCustomer">得意先 <span class="required">*</span></label>
                  <select id="salesCustomer" class="form-control">
                    <option value="">選択してください</option>
                  </select>
                </div>
              </div>

              <div class="form-group">
                <label for="salesAmount">売上額（円） <span class="required">*</span></label>
                <input type="number" id="salesAmount" class="form-control" placeholder="例：500000" min="1" step="1">
                <div style="font-size:11px; color:#888; margin-top:4px;" id="amountPreview"></div>
              </div>

              <div class="form-group">
                <label>入力区分 <span class="required">*</span></label>
                <div style="display:flex; gap:20px; margin-top:6px;">
                  <div class="form-check">
                    <input type="radio" name="salesType" id="typeNew" value="新規" checked>
                    <label for="typeNew">新規</label>
                  </div>
                  <div class="form-check">
                    <input type="radio" name="salesType" id="typeRepeat" value="定期">
                    <label for="typeRepeat">定期</label>
                  </div>
                  <div class="form-check">
                    <input type="radio" name="salesType" id="typeOther" value="その他">
                    <label for="typeOther">その他</label>
                  </div>
                </div>
              </div>

              <div class="form-group">
                <label for="salesNote">備考</label>
                <textarea id="salesNote" class="form-control" rows="3" placeholder="備考があれば入力してください（任意）"></textarea>
              </div>

              <div class="form-check" style="margin-bottom:20px;">
                <input type="checkbox" id="confirmCheck">
                <label for="confirmCheck">入力内容を確認しました</label>
              </div>

              <div style="display:flex; gap:12px; justify-content:flex-end;">
                <button type="button" class="btn btn-outline" onclick="resetForm()">&#x21BA; リセット</button>
                <button type="button" class="btn btn-primary" onclick="showConfirm()">確認画面へ &rarr;</button>
              </div>
            </form>
          </div>
        </div>

        <!-- STEP 2: 確認画面 -->
        <div class="card input-card hidden" id="confirmSection">
          <div class="card-header">
            <h3>&#128196; 入力内容の確認</h3>
          </div>
          <div class="card-body">
            <div class="alert alert-warning">
              &#9888;&#65039; 以下の内容で登録します。内容をご確認ください。
            </div>
            <table class="confirm-table">
              <tr><td>売上日</td><td id="conf_date"></td></tr>
              <tr><td>得意先</td><td id="conf_customer"></td></tr>
              <tr><td>売上額</td><td id="conf_amount"></td></tr>
              <tr><td>入力区分</td><td id="conf_type"></td></tr>
              <tr><td>備考</td><td id="conf_note"></td></tr>
            </table>
            <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:20px;">
              <button class="btn btn-outline" onclick="backToForm()">&larr; 修正する</button>
              <button class="btn btn-success" onclick="doSubmit()">&#10003; 登録する</button>
            </div>
          </div>
        </div>

        <!-- STEP 3: 完了 -->
        <div class="card input-card hidden" id="completeSection">
          <div class="card-body" style="text-align:center; padding: 40px 20px;">
            <div style="font-size:56px; margin-bottom:16px;">&#9989;</div>
            <h3 style="font-size:20px; color:#00b274; margin-bottom:8px;">登録が完了しました</h3>
            <p style="font-size:13px; color:#888; margin-bottom:24px;">売上データが正常に登録されました。</p>
            <div style="background:#f8fafc; border-radius:6px; padding:12px; margin-bottom:24px; font-size:13px;">
              <strong>登録ID：</strong> <span id="registeredId" style="color:#2c7be5; font-weight:700;"></span>
            </div>
            <div style="display:flex; gap:12px; justify-content:center;">
              <button class="btn btn-outline" onclick="newEntry()">&#43; 続けて入力する</button>
              <a href="sales-list.html" class="btn btn-primary">売上一覧を見る</a>
            </div>
          </div>
        </div>
      </div>

      <div class="app-footer">
        &copy; 2025 PAD練習サイト
      </div>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script>
    checkLogin();
    document.getElementById('sidebarContainer').innerHTML = renderSidebar('sales-input');
    const uname = sessionStorage.getItem('userName') || 'user';
    document.getElementById('userName').textContent = uname;
    document.getElementById('userAvatar').textContent = uname.charAt(0).toUpperCase();

    // 今日の日付をデフォルトに
    const today = new Date().toISOString().slice(0, 10);
    document.getElementById('salesDate').value = today;

    // 得意先プルダウン
    const sel = document.getElementById('salesCustomer');
    CUSTOMERS.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.name;
      sel.appendChild(opt);
    });

    // 金額プレビュー
    document.getElementById('salesAmount').addEventListener('input', function() {
      const v = parseInt(this.value);
      const pre = document.getElementById('amountPreview');
      if (v > 0) {
        pre.textContent = '表示：' + formatMoney(v);
      } else {
        pre.textContent = '';
      }
    });

    function resetForm() {
      document.getElementById('salesDate').value = today;
      document.getElementById('salesCustomer').value = '';
      document.getElementById('salesAmount').value = '';
      document.getElementById('salesNote').value = '';
      document.getElementById('typeNew').checked = true;
      document.getElementById('confirmCheck').checked = false;
      document.getElementById('amountPreview').textContent = '';
      document.getElementById('formAlert').innerHTML = '';
    }

    function showConfirm() {
      const date = document.getElementById('salesDate').value;
      const customerId = document.getElementById('salesCustomer').value;
      const amount = parseInt(document.getElementById('salesAmount').value);
      const type = document.querySelector('input[name="salesType"]:checked').value;
      const note = document.getElementById('salesNote').value.trim();
      const checked = document.getElementById('confirmCheck').checked;

      let errors = [];
      if (!date) errors.push('売上日を入力してください');
      if (!customerId) errors.push('得意先を選択してください');
      if (!amount || amount <= 0) errors.push('売上額を正しく入力してください');
      if (!checked) errors.push('入力内容の確認チェックをお願いします');

      if (errors.length > 0) {
        document.getElementById('formAlert').innerHTML = `<div class="alert alert-danger">&#9888; ${errors.join('<br>&#9888; ')}</div>`;
        return;
      }
      document.getElementById('formAlert').innerHTML = '';

      const customer = CUSTOMERS.find(c => c.id === customerId);

      // 確認画面にセット
      document.getElementById('conf_date').textContent = date.replace(/-/g, '/');
      document.getElementById('conf_customer').textContent = customer ? customer.name : customerId;
      document.getElementById('conf_amount').textContent = formatMoney(amount);
      document.getElementById('conf_type').textContent = type;
      document.getElementById('conf_note').textContent = note || '（なし）';

      document.getElementById('formSection').classList.add('hidden');
      document.getElementById('confirmSection').classList.remove('hidden');

      // ステップ更新
      document.getElementById('step1').className = 'step done';
      document.getElementById('step1').querySelector('.step-num').textContent = '✓';
      document.getElementById('step2').className = 'step active';
      document.getElementById('line12').className = 'step-line done';
    }

    function backToForm() {
      document.getElementById('confirmSection').classList.add('hidden');
      document.getElementById('formSection').classList.remove('hidden');
      document.getElementById('step1').className = 'step active';
      document.getElementById('step1').querySelector('.step-num').textContent = '1';
      document.getElementById('step2').className = 'step';
      document.getElementById('line12').className = 'step-line';
    }

    function doSubmit() {
      // 登録処理（sessionStorageに追記）
      const date = document.getElementById('salesDate').value.replace(/-/g, '/');
      const customerId = document.getElementById('salesCustomer').value;
      const amount = parseInt(document.getElementById('salesAmount').value);
      const type = document.querySelector('input[name="salesType"]:checked').value;
      const note = document.getElementById('salesNote').value.trim();
      const customer = CUSTOMERS.find(c => c.id === customerId);

      let sales = JSON.parse(sessionStorage.getItem('salesData') || 'null') || [...SALES_DATA];
      const newId = 'S' + String(sales.length + 1).padStart(3, '0');
      sales.push({
        id: newId,
        date,
        customerId,
        customerName: customer ? customer.name : customerId,
        amount,
        note: type === 'その他' ? note : (type === '定期' ? '定期発注' + (note ? '/' + note : '') : note),
      });
      sessionStorage.setItem('salesData', JSON.stringify(sales));

      document.getElementById('registeredId').textContent = newId;

      document.getElementById('confirmSection').classList.add('hidden');
      document.getElementById('completeSection').classList.remove('hidden');

      // ステップ完了
      document.getElementById('step2').className = 'step done';
      document.getElementById('step2').querySelector('.step-num').textContent = '✓';
      document.getElementById('step3').className = 'step done';
      document.getElementById('step3').querySelector('.step-num').textContent = '✓';
      document.getElementById('line23').className = 'step-line done';
    }

    function newEntry() {
      resetForm();
      document.getElementById('completeSection').classList.add('hidden');
      document.getElementById('formSection').classList.remove('hidden');
      // ステップリセット
      document.getElementById('step1').className = 'step active';
      document.getElementById('step1').querySelector('.step-num').textContent = '1';
      document.getElementById('step2').className = 'step';
      document.getElementById('step2').querySelector('.step-num').textContent = '2';
      document.getElementById('step3').className = 'step';
      document.getElementById('step3').querySelector('.step-num').textContent = '3';
      document.getElementById('line12').className = 'step-line';
      document.getElementById('line23').className = 'step-line';
    }
  </script>
</body>
</html>
