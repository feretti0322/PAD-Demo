<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>得意先一覧 | PAD練習サイト</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">
    <div id="sidebarContainer"></div>

    <div class="main-content">
      <div class="topbar">
        <div>
          <div class="topbar-title">得意先一覧</div>
          <div class="breadcrumb">ホーム &rsaquo; 得意先一覧</div>
        </div>
        <div class="topbar-right">
          <div class="topbar-user">
            <div class="user-avatar" id="userAvatar">U</div>
            <span id="userName">user</span>
          </div>
        </div>
      </div>

      <div class="page-content">
        <div id="alertArea"></div>

        <div class="card">
          <!-- 検索・フィルターバー -->
          <div class="filter-bar">
            <div class="filter-group">
              <label>キーワード検索</label>
              <input type="text" id="searchKeyword" class="form-control" placeholder="得意先名・住所など" style="min-width:220px;" oninput="filterTable()">
            </div>
            <div class="filter-group">
              <label>業種</label>
              <select id="filterIndustry" class="form-control" onchange="filterTable()">
                <option value="">すべての業種</option>
                <option value="製造業">製造業</option>
                <option value="サービス業">サービス業</option>
                <option value="飲食業">飲食業</option>
                <option value="その他">その他</option>
              </select>
            </div>
            <button class="btn btn-outline btn-sm" onclick="clearFilter()">&#x2715; クリア</button>
            <div style="margin-left:auto;">
              <button class="btn btn-primary btn-sm" onclick="openAddModal()">&#43; 新規登録</button>
            </div>
          </div>

          <!-- テーブル -->
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>得意先ID</th>
                  <th>得意先名称</th>
                  <th>業種</th>
                  <th>郵便番号</th>
                  <th>住所</th>
                  <th>電話番号</th>
                  <th class="center">操作</th>
                </tr>
              </thead>
              <tbody id="customerTbody"></tbody>
            </table>
          </div>

          <!-- ページネーション -->
          <div class="pagination">
            <div class="page-info" id="pageInfo"></div>
            <button class="page-btn" id="prevBtn" onclick="changePage(-1)">&#8249;</button>
            <div id="pageNumbers"></div>
            <button class="page-btn" id="nextBtn" onclick="changePage(1)">&#8250;</button>
          </div>
        </div>
      </div>

      <div class="app-footer">
        &copy; 2025 PAD練習サイト
      </div>
    </div>
  </div>

  <!-- 新規登録 / 編集モーダル -->
  <div class="modal-overlay" id="formModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">得意先 新規登録</h3>
        <button class="modal-close" onclick="closeModal()">&#10005;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="m_name">得意先名称 <span class="required">*</span></label>
          <input type="text" id="m_name" class="form-control" placeholder="例：株式会社〇〇商事">
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label for="m_industry">業種 <span class="required">*</span></label>
            <select id="m_industry" class="form-control">
              <option value="">選択してください</option>
              <option value="製造業">製造業</option>
              <option value="サービス業">サービス業</option>
              <option value="飲食業">飲食業</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <div class="form-group">
            <label for="m_zip">郵便番号</label>
            <input type="text" id="m_zip" class="form-control" placeholder="例：100-0001">
          </div>
        </div>
        <div class="form-group">
          <label for="m_address">住所</label>
          <input type="text" id="m_address" class="form-control" placeholder="例：東京都千代田区〇〇1-1-1">
        </div>
        <div class="form-group">
          <label for="m_tel">電話番号</label>
          <input type="text" id="m_tel" class="form-control" placeholder="例：03-0000-0000">
        </div>
        <div id="modalError" class="alert alert-danger hidden">入力内容を確認してください</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">キャンセル</button>
        <button class="btn btn-primary" id="modalSaveBtn" onclick="saveCustomer()">登録する</button>
      </div>
    </div>
  </div>

  <!-- 削除確認モーダル -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal" style="width:380px;">
      <div class="modal-header">
        <h3>&#9888;&#65039; 削除の確認</h3>
        <button class="modal-close" onclick="closeDeleteModal()">&#10005;</button>
      </div>
      <div class="modal-body">
        <p style="font-size:14px; color:#333;">
          <strong id="deleteTarget"></strong> を削除します。<br>
          この操作は元に戻せません。よろしいですか？
        </p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeDeleteModal()">キャンセル</button>
        <button class="btn btn-danger" onclick="confirmDelete()">削除する</button>
      </div>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script>
    checkLogin();
    document.getElementById('sidebarContainer').innerHTML = renderSidebar('customer');
    const uname = sessionStorage.getItem('userName') || 'user';
    document.getElementById('userName').textContent = uname;
    document.getElementById('userAvatar').textContent = uname.charAt(0).toUpperCase();

    // データ（セッション保持）
    let customers = JSON.parse(sessionStorage.getItem('customers') || 'null') || [...CUSTOMERS];
    let nextId = customers.length + 1;
    let currentPage = 1;
    const PER_PAGE = 5;
    let editTarget = null;
    let deleteTargetId = null;

    function getFiltered() {
      const kw = document.getElementById('searchKeyword').value.toLowerCase();
      const ind = document.getElementById('filterIndustry').value;
      return customers.filter(c => {
        const matchKw = !kw || c.name.toLowerCase().includes(kw) || c.address.toLowerCase().includes(kw) || c.tel.includes(kw);
        const matchInd = !ind || c.industry === ind;
        return matchKw && matchInd;
      });
    }

    function renderTable() {
      const filtered = getFiltered();
      const totalPages = Math.ceil(filtered.length / PER_PAGE) || 1;
      if (currentPage > totalPages) currentPage = totalPages;
      const start = (currentPage - 1) * PER_PAGE;
      const pageData = filtered.slice(start, start + PER_PAGE);

      const tbody = document.getElementById('customerTbody');
      tbody.innerHTML = '';

      if (pageData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted" style="padding:32px;">該当するデータがありません</td></tr>';
      } else {
        pageData.forEach(c => {
          const indClass = { '製造業': 'badge-info', 'サービス業': 'badge-success', '飲食業': 'badge-warning', 'その他': 'badge-secondary' }[c.industry] || 'badge-secondary';
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><span class="text-muted">${c.id}</span></td>
            <td><strong>${c.name}</strong></td>
            <td><span class="badge ${indClass}">${c.industry}</span></td>
            <td>${c.zip}</td>
            <td style="max-width:200px;">${c.address}</td>
            <td>${c.tel}</td>
            <td class="center">
              <button class="btn btn-outline btn-sm" onclick="openEditModal('${c.id}')">編集</button>
              <button class="btn btn-danger btn-sm" style="margin-left:4px;" onclick="openDeleteModal('${c.id}')">削除</button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }

      // ページ情報
      document.getElementById('pageInfo').textContent = `全${filtered.length}件中 ${start+1}〜${Math.min(start+PER_PAGE, filtered.length)}件表示`;

      // ページ番号
      const pn = document.getElementById('pageNumbers');
      pn.innerHTML = '';
      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.className = 'page-btn' + (i === currentPage ? ' active' : '');
        btn.textContent = i;
        btn.onclick = () => { currentPage = i; renderTable(); };
        pn.appendChild(btn);
      }

      document.getElementById('prevBtn').classList.toggle('disabled', currentPage === 1);
      document.getElementById('nextBtn').classList.toggle('disabled', currentPage === totalPages);
    }

    function filterTable() {
      currentPage = 1;
      renderTable();
    }

    function clearFilter() {
      document.getElementById('searchKeyword').value = '';
      document.getElementById('filterIndustry').value = '';
      filterTable();
    }

    function changePage(dir) {
      const filtered = getFiltered();
      const totalPages = Math.ceil(filtered.length / PER_PAGE) || 1;
      currentPage = Math.max(1, Math.min(totalPages, currentPage + dir));
      renderTable();
    }

    function openAddModal() {
      editTarget = null;
      document.getElementById('modalTitle').textContent = '得意先 新規登録';
      document.getElementById('modalSaveBtn').textContent = '登録する';
      document.getElementById('m_name').value = '';
      document.getElementById('m_industry').value = '';
      document.getElementById('m_zip').value = '';
      document.getElementById('m_address').value = '';
      document.getElementById('m_tel').value = '';
      document.getElementById('modalError').classList.add('hidden');
      document.getElementById('formModal').classList.add('open');
    }

    function openEditModal(id) {
      const c = customers.find(x => x.id === id);
      if (!c) return;
      editTarget = id;
      document.getElementById('modalTitle').textContent = '得意先 編集';
      document.getElementById('modalSaveBtn').textContent = '更新する';
      document.getElementById('m_name').value = c.name;
      document.getElementById('m_industry').value = c.industry;
      document.getElementById('m_zip').value = c.zip;
      document.getElementById('m_address').value = c.address;
      document.getElementById('m_tel').value = c.tel;
      document.getElementById('modalError').classList.add('hidden');
      document.getElementById('formModal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('formModal').classList.remove('open');
    }

    function saveCustomer() {
      const name = document.getElementById('m_name').value.trim();
      const industry = document.getElementById('m_industry').value;
      if (!name || !industry) {
        document.getElementById('modalError').classList.remove('hidden');
        return;
      }
      document.getElementById('modalError').classList.add('hidden');

      if (editTarget) {
        const idx = customers.findIndex(c => c.id === editTarget);
        customers[idx] = {
          ...customers[idx],
          name,
          industry,
          zip: document.getElementById('m_zip').value.trim(),
          address: document.getElementById('m_address').value.trim(),
          tel: document.getElementById('m_tel').value.trim(),
        };
        showAlert('success', `${name} の情報を更新しました`);
      } else {
        const newId = 'C' + String(nextId++).padStart(3, '0');
        customers.push({
          id: newId,
          name,
          industry,
          zip: document.getElementById('m_zip').value.trim(),
          address: document.getElementById('m_address').value.trim(),
          tel: document.getElementById('m_tel').value.trim(),
        });
        showAlert('success', `${name} を新規登録しました`);
      }
      sessionStorage.setItem('customers', JSON.stringify(customers));
      closeModal();
      renderTable();
    }

    function openDeleteModal(id) {
      const c = customers.find(x => x.id === id);
      if (!c) return;
      deleteTargetId = id;
      document.getElementById('deleteTarget').textContent = c.name;
      document.getElementById('deleteModal').classList.add('open');
    }

    function closeDeleteModal() {
      document.getElementById('deleteModal').classList.remove('open');
      deleteTargetId = null;
    }

    function confirmDelete() {
      const c = customers.find(x => x.id === deleteTargetId);
      customers = customers.filter(x => x.id !== deleteTargetId);
      sessionStorage.setItem('customers', JSON.stringify(customers));
      closeDeleteModal();
      showAlert('success', `${c.name} を削除しました`);
      renderTable();
    }

    function showAlert(type, msg) {
      const area = document.getElementById('alertArea');
      area.innerHTML = `<div class="alert alert-${type}">&#10003; ${msg}</div>`;
      setTimeout(() => { area.innerHTML = ''; }, 3000);
    }

    renderTable();
  </script>
</body>
</html>
